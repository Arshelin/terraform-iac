# GKE clusters registered in ArgoCD via Workload Identity (argocd-k8s-auth gcp)
clusters:
  dev:
    server: "https://34.118.78.227"
    caData: ""
    imageUpdaterImage: "europe-central2-docker.pkg.dev/project-77fd6584-9134-4b27-9b1/webapp-dev/webapp"
    targetRevision: main

  prod:
    server: "https://34.118.31.93"
    caData: ""
    imageUpdaterImage: ""
    targetRevision: "1.0.0"

# Git repository for ArgoCD
repository:
  url: https://github.com/Arshelin/helm-charts

# ApplicationSet configuration
appset:
  name: spring-boot-api
  repoURL: https://github.com/Arshelin/helm-charts
  chartPath: spring-boot-api
  valuesPath: spring-boot-api/values
  namespace: spring-boot-api
  project: spring-boot-api
